name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish (must equal v<chatbridge.__version__>, e.g. v1.0.2)"
        required: true

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check tag matches chatbridge.__version__
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("chatbridge/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("could not find __version__ in chatbridge/__init__.py")
          print(match.group(1))
          PY
          )"
          expected="v$version"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Release tag '$RELEASE_TAG' does not match the checked-out source version '$expected' (chatbridge/__init__.py)." >&2
            echo "Bump chatbridge/__init__.py (plus package.json and rust/chatbridge-tui/Cargo.toml) or fix the tag/input." >&2
            exit 1
          fi
          echo "Release tag $RELEASE_TAG matches chatbridge.__version__ $version."

  build:
    name: Build ${{ matrix.asset }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: chatbridge-linux-x64
            binary: chatbridge-tui
            archive: tar.gz
            rust_target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            asset: chatbridge-linux-arm64
            binary: chatbridge-tui
            archive: tar.gz
            rust_target: aarch64-unknown-linux-musl
          - os: windows-latest
            asset: chatbridge-windows-x64
            binary: chatbridge-tui.exe
            archive: zip
            rust_target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install musl tools
        if: contains(matrix.rust_target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools binutils

      - name: Build TUI
        shell: bash
        run: |
          set -euo pipefail
          rust_target="${{ matrix.rust_target }}"
          build_dir="rust/chatbridge-tui/target/release"
          target_args=()
          if [ -n "$rust_target" ]; then
            target_args=(--target "$rust_target")
            build_dir="rust/chatbridge-tui/target/$rust_target/release"
          fi
          cargo build --manifest-path rust/chatbridge-tui/Cargo.toml --release "${target_args[@]}"
          echo "CHATBRIDGE_BUILD_DIR=$build_dir" >> "$GITHUB_ENV"

      - name: Prepare package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist package
          mkdir -p package/chatbridge/bin dist
          cp -R chatbridge package/chatbridge/
          cp -R docs package/chatbridge/
          cp README.md README.zh-CN.md LICENSE package/chatbridge/
          cp "$CHATBRIDGE_BUILD_DIR/${{ matrix.binary }}" package/chatbridge/bin/

      - name: Check packaged binary
        shell: bash
        run: |
          set -euo pipefail
          binary="package/chatbridge/bin/${{ matrix.binary }}"
          test -f "$binary"
          case "${{ runner.os }}" in
            Windows) ;;
            *) test -x "$binary" ;;
          esac
          file "$binary" || true

      - name: Smoke packaged TUI
        if: runner.os != 'macOS'
        shell: bash
        run: CHATBRIDGE_TUI_SMOKE=1 "package/chatbridge/bin/${{ matrix.binary }}"

      - name: Verify Linux binary is static
        if: contains(matrix.rust_target, 'linux-musl')
        shell: bash
        run: |
          set -euo pipefail
          binary="package/chatbridge/bin/${{ matrix.binary }}"
          file "$binary"
          if readelf -l "$binary" | grep -q 'Requesting program interpreter'; then
            echo "Linux release binary is dynamically linked; rebuild it as static musl." >&2
            exit 1
          fi

      - name: Archive tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -C package -czf "dist/${{ matrix.asset }}.tar.gz" chatbridge

      - name: Archive zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path package/chatbridge -DestinationPath "dist/${{ matrix.asset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  build-macos:
    name: Build macOS release assets
    needs: validate
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build and package macOS assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist package-*
          mkdir -p dist

          build_asset() {
            local target="$1"
            local asset="$2"
            local package_dir="package-$asset"
            local binary="rust/chatbridge-tui/target/$target/release/chatbridge-tui"

            cargo build --manifest-path rust/chatbridge-tui/Cargo.toml --release --target "$target"

            mkdir -p "$package_dir/chatbridge/bin"
            cp -R chatbridge "$package_dir/chatbridge/"
            cp -R docs "$package_dir/chatbridge/"
            cp README.md README.zh-CN.md LICENSE "$package_dir/chatbridge/"
            cp "$binary" "$package_dir/chatbridge/bin/"

            test -x "$package_dir/chatbridge/bin/chatbridge-tui"
            file "$package_dir/chatbridge/bin/chatbridge-tui"
            tar -C "$package_dir" -czf "dist/$asset.tar.gz" chatbridge
          }

          build_asset aarch64-apple-darwin chatbridge-macos-arm64
          build_asset x86_64-apple-darwin chatbridge-macos-x64

      - name: Smoke macOS binaries
        shell: bash
        run: |
          set -euo pipefail
          smoke_asset() {
            local asset="$1"
            shift
            rm -rf "smoke-$asset"
            mkdir "smoke-$asset"
            tar -xzf "dist/$asset.tar.gz" -C "smoke-$asset"
            CHATBRIDGE_TUI_SMOKE=1 "$@" "smoke-$asset/chatbridge/bin/chatbridge-tui"
          }
          case "$(uname -m)" in
            arm64)
              smoke_asset chatbridge-macos-arm64
              if arch -x86_64 /usr/bin/true 2>/dev/null; then
                smoke_asset chatbridge-macos-x64 arch -x86_64
              else
                echo "::warning title=Rosetta unavailable::Skipping chatbridge-macos-x64 smoke: this arm64 runner cannot run x86_64 binaries."
              fi
              ;;
            x86_64)
              smoke_asset chatbridge-macos-x64
              ;;
            *)
              echo "Unsupported macOS runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chatbridge-macos
          path: dist/*

  publish:
    name: Publish GitHub Release
    needs:
      - build
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Add installer scripts
        run: |
          cp install.sh install.ps1 dist/
          ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          overwrite_files: true
          generate_release_notes: true
